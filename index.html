<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noor AI</title>
  <style>
    :root { --primary: #202123; --sidebar: #202123; --chat-bg: #343541; --text: #ececf1; }
    body { font-family: 'Inter', sans-serif; background: var(--chat-bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
    #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
    header { padding: 15px; background: rgba(52, 53, 65, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; font-weight: 600; }
    #chat-box { flex: 1; overflow-y: auto; padding: 5% 15%; display: flex; flex-direction: column; gap: 20px; }
    .msg { padding: 20px; line-height: 1.6; max-width: 100%; border-radius: 5px; }
    .no_user { background: #444654; } /* Bot message background */
    .user { background: transparent; } /* User message background */
    #status { font-size: 12px; color: #8e8ea0; text-align: center; padding: 10px; }
    #input-container { padding: 20px 15%; background: linear-gradient(transparent, var(--chat-bg)); }
    .input-wrapper { position: relative; display: flex; align-items: center; background: #40414f; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    input { flex: 1; background: transparent; border: none; color: white; padding: 15px; outline: none; font-size: 16px; }
    button { background: transparent; border: none; color: #acacbe; padding: 10px 15px; cursor: pointer; transition: 0.3s; }
    button:disabled { opacity: 0.3; }
    button:hover:not(:disabled) { color: white; }
    pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; } /* For code blocks */
  </style>
</head>
<body>

  <div id="main-content">
    <header>Noor AI</header>
    <div id="status">Initializing Engine...</div>
    <div id="chat-box">
      <div class="msg no_user">Hello. I am Noor, an AI coding assistant. How can I help you today?</div>
    </div>

    <div id="input-container">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Send a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()" disabled>
          <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="20" width="20"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chatBox = document.getElementById('chat-box');
    const statusLabel = document.getElementById('status');
    const sendBtn = document.getElementById('send-btn');
    const userInput = document.getElementById('user-input');

    const appConfig = {
      model_list: [{
        "model": "https://huggingface.co/mlc-ai/SmolLM-135M-Instruct-v0.2-q4f16_1-MLC",
        "model_id": "SmolLM-135M-Instruct-v0.2-q4f16_1-MLC",
        "model_lib": "https://raw.githubusercontent.com/mlc-ai/binary-mlc-llm-libs/main/smollm-135m-instruct-v0.2/smollm-135m-instruct-v0.2-q4f16_1-ctx2k-webgpu.wasm"
      }]
    };

    // Professional Personality
    const systemPrompt = "You are Noor, a professional AI coding expert. Your tone is helpful, concise, and technical. You provide high-quality code snippets and explanations.";
    let engine;

    async function init() {
      try {
        engine = await webllm.CreateMLCEngine("SmolLM-135M-Instruct-v0.2-q4f16_1-MLC", {
          appConfig: appConfig,
          initProgressCallback: (p) => { statusLabel.innerText = p.text; }
        });
        statusLabel.innerText = "Engine Ready";
        sendBtn.disabled = false;
      } catch (err) {
        statusLabel.innerText = "Initialization Failed: " + err.message;
      }
    }

    window.sendMessage = async () => {
      const text = userInput.value.trim();
      if (!text || sendBtn.disabled) return;

      appendMessage(text, 'user');
      userInput.value = "";
      sendBtn.disabled = true;

      try {
        const messages = [{ role: "system", content: systemPrompt }, { role: "user", content: text }];
        const chunks = await engine.chat.completions.create({ messages });
        appendMessage(chunks.choices[0].message.content, 'no_user');
      } catch (e) {
        appendMessage("System Error: " + e.message, 'no_user');
      }
      sendBtn.disabled = false;
    };

    function appendMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    init();
  </script>
</body>
</html>
